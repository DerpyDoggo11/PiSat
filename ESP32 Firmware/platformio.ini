
[env:esp_gnss]
platform  = espressif32
board = esp32-c3-devkitm-1 
framework = arduino

board_build.flash_mode = dio
board_build.f_flash    = 80000000L
board_build.partitions = default.csv

upload_port = COM7
monitor_port = COM7
upload_speed = 115200
monitor_speed = 115200
upload_resetmethod = default_reset

build_flags =
    -DARDUINO_USB_MODE=0  
    -DCORE_DEBUG_LEVEL=1
